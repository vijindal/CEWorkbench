# Java Logging Configuration for CVM Tracing
# Place this file in the project root or pass via: java -Djava.util.logging.config.file=logging.properties

# Global level: INFO to filter out noisy AWT/Swing logs
.level = INFO

# CE Workflow and CVM Engine — FINE level for detailed traces
org.ce.workflow.thermo.ThermodynamicWorkflow.level = FINE
org.ce.workflow.thermo.LineScanWorkflow.level = FINE
org.ce.domain.engine.cvm.CVMEngine.level = FINE
org.ce.domain.engine.cvm.CVMPhaseModel.level = FINE
org.ce.domain.engine.cvm.NewtonRaphsonSolverSimple.level = FINE
org.ce.domain.engine.cvm.CVMFreeEnergy.level = FINER
org.ce.domain.cluster.ClusterVariableEvaluator.level = FINER

# Suppress noisy framework logs
sun.awt.level = WARNING
java.awt.level = WARNING
javax.swing.level = WARNING

# Console output
handlers = java.util.logging.ConsoleHandler
java.util.logging.ConsoleHandler.level = FINEST
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format = [%4$-7s] %5$s%n
