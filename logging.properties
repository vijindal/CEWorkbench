# Java Logging Configuration for CVM Tracing
# Place this file in the project root or pass via: java -Djava.util.logging.config.file=logging.properties

# Global level: WARNING to filter out all normal logs
.level = WARNING

# CE Workflow and CVM Engine — WARNING level for detailed traces
org.ce.workflow.thermo.ThermodynamicWorkflow.level = WARNING
org.ce.workflow.thermo.LineScanWorkflow.level = WARNING
org.ce.domain.engine.cvm.CVMEngine.level = WARNING
org.ce.domain.engine.cvm.CVMPhaseModel.level = WARNING
org.ce.domain.engine.cvm.NewtonRaphsonSolverSimple.level = WARNING
org.ce.domain.engine.cvm.CVMFreeEnergy.level = WARNING
org.ce.domain.cluster.ClusterVariableEvaluator.level = WARNING

# Suppress noisy framework logs
sun.awt.level = WARNING
java.awt.level = WARNING
javax.swing.level = WARNING

# Console output
handlers = java.util.logging.ConsoleHandler
java.util.logging.ConsoleHandler.level = FINEST
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format = [%4$-7s] %5$s%n
